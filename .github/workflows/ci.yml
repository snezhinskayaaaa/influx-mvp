name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx prisma generate

      - run: npm run lint

      - run: npm run build
        env:
          DATABASE_URL: "postgresql://fake:fake@localhost:5432/fake"
          JWT_SECRET: "ci-test-secret-not-real-needs-32-chars-minimum-here"
          RESEND_API_KEY: "re_fake_ci"
          NEXT_PUBLIC_APP_URL: "https://aiinflux.io"
